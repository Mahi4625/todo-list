<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Applications Webpage</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous" />
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styling.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
</head>
<body>
    <script src = "javascript.js" defer></script>
<div class = "background-container" p-3">
    <div class = "row">
        <div class = "col-12">
            <h1 class="heading text-center">TODOS</h1>
        </div>
        <div class="col-12">
            <div class="d-flex flex-row justify-content-center">
               <input type="text" placeholder="Enter Your Todo" class="input-el" id="inputEl"/>
               <button class = "btn add-btn ml-3 text-white" id = "addBtn">Add</button>
            </div>
        </div>
        <div class="col-12">
            <h1 class = "todo-list text-left"><span class="my">MY</span> TODO LIST</h1>
        </div>
         <div class =  "d-flex flex-column justify-content-start">
           <ul class = "todo-list-container" id = "todoListContainer">

           </ul>
        </div>
    </div>
     <button class = "btn store-btn ml-3 mt-3 text-white" id="storeBtn">Store</button>
    </div>
</body>
</html>
