<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Micro Loader with Globe</title>
  <style>
    /* Main Layout Card Container */
    .loader-card {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 16px;
      max-width: 240px;
      margin: 40px auto;
      gap: 12px;
    }

    /* Face Container - 30px Scale */
    .face-container {
      position: relative;
      width: 30px;
      height: 30px;
      flex-shrink: 0;
    }

    /* Outer Ring Frame */
    .dark-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid #1f2937;
      overflow: hidden;
      background-color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

    /* The SVG Globe - Tilted & Spinning Anti-Clockwise */
    .globe-svg {
      width: 90%;
      height: 90%;
      fill: #1f2937;
      opacity: 0.85; /* Slight opacity so it acts as a true background element */
      /* Continuous anti-clockwise rotation */
      animation: rotateGlobeAntiClockwise 6s linear infinite;
    }

    /* Minimalist Face (Remains perfectly still and balanced on top) */
    .line-face {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 18px;
      height: 18px;
      z-index: 5; /* Keeps face firmly on top of the globe */
    }

    /* Eyes with a white background glow to stay visible over black landmasses */
    .line-face::before, .line-face::after {
      content: "";
      position: absolute;
      top: 4px;
      width: 3.5px;
      height: 3.5px;
      background-color: #1f2937;
      border-radius: 50%;
      /* High-contrast halo so eyes are always visible */
      box-shadow: 0 0 3px 2px #ffffff; 
    }
    .line-face::before { left: 2px; }
    .line-face::after { right: 2px; }

    /* Minimalist Dynamic Mouth Container */
    .mouth-wrapper {
      position: absolute;
      bottom: 2px;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 7px;
      overflow: hidden;
    }

    /* The Mouth Line with white glow backing */
    .mouth {
      width: 12px;
      height: 12px;
      border: 2px solid #1f2937;
      border-radius: 50%;
      box-sizing: border-box;
      position: absolute;
      left: 1px;
      /* Dropshadow acts as a structural border over background graphics */
      filter: drop-shadow(0px 0px 1.5px #ffffff) drop-shadow(0px 0px 1.5px #ffffff);
      
      /* Smoothly morphs from neutral to a wide smile */
      animation: smileGrow 3s ease-in-out infinite;
    }

    /* Flowing Loading Dots Container */
    .dark-dots {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 30px;
    }

    /* Individual Flowing Dot Configuration */
    .dark-dots span {
      display: inline-block;
      width: 4px;
      height: 4px;
      background-color: #1f2937;
      border-radius: 50%;
      animation: dotHorizontalFlow 1.4s ease-in-out infinite;
    }

    /* Staggered animation delays for the trailing ripple effect */
    .dark-dots span:nth-child(1) { animation-delay: 0s; }
    .dark-dots span:nth-child(2) { animation-delay: 0.2s; }
    .dark-dots span:nth-child(3) { animation-delay: 0.4s; }

    /* --- ANIMATION KEYFRAMES --- */

    /* Exact Anti-Clockwise Rotation */
    @keyframes rotateGlobeAntiClockwise {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }

    /* Mouth Shape Expansion */
    @keyframes smileGrow {
      0%, 100% {
        top: 2px;
        border-radius: 0%;
        border-top: none;
        border-left: none;
        border-right: none;
      }
      40%, 70% {
        top: -5px;
        border-radius: 50%;
        border-top: 2px solid transparent;
      }
    }

    /* Horizontal Flowing Ripple Effect */
    @keyframes dotHorizontalFlow {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      35% { transform: scale(1.5); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="loader-card">
    
    <div class="face-container">
      <div class="dark-ring">
        <svg class="globe-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
        </svg>
      </div>
      
      <div class="line-face">
        <div class="mouth-wrapper">
          <div class="mouth"></div>
        </div>
      </div>
    </div>
    
    <div class="dark-dots">
      <span></span>
      <span></span>
      <span></span>
    </div>

  </div>

</body>
</html>
